<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - QuizForge</title>
    <link rel="stylesheet" href="../css/login.css" />
    <script src="../js/login.js"></script>
  </head>
  <body>
    <header class="header">
      <h1>Trang Đăng Nhập</h1>
    </header>
    <main class="main">
      <section class="title">
        <h2>Đăng nhập</h2>
        <p>
          QuizForge – Nền tảng sáng tạo bài kiểm tra trực tuyến, giúp bạn dễ
          dàng thiết kế, chia sẻ và thực hiện các bài kiểm tra một cách nhanh
          chóng và hiệu quả!
        </p>
      </section>

      <section class="form-login">
        <form action="">
          <div class="login-box">
            <label for="email-login">Email</label>
            <input
              type="email"
              id="email-login"
              placeholder="Địa chỉ email"
              class="input-center"
            />
          </div>
          <div class="login-box">
            <label for="pass-login">Password</label>
            <input
              type="password"
              id="pass-login"
              placeholder="Mật khẩu"
              class="input-center"
            />
          </div>
          <p class="error-login"></p>
          <button type="button" id="btn-login" onclick="handleLogin()">
            Đăng nhập
          </button>
        </form>

        <p class="register-link">
          Chưa có tài khoản? <a href="../index.html">Đăng ký</a>
        </p>
      </section>
    </main>
  </body>
</html>
